<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background: Rounded square in parchment -->
  <rect x="2" y="2" width="28" height="28" rx="6" fill="#d4b896"/>
  
  <!-- 𒀭 (DINGIR/AN) symbol - stylized star shape in lapis -->
  <g fill="#1a365d">
    <!-- Center vertical wedge -->
    <polygon points="16,6 18,16 16,18 14,16"/>
    <!-- Left diagonal wedge -->
    <polygon points="8,10 14,14 13,16 7,12"/>
    <!-- Right diagonal wedge -->
    <polygon points="24,10 18,14 19,16 25,12"/>
    <!-- Bottom left wedge -->
    <polygon points="10,24 14,18 16,19 12,26"/>
    <!-- Bottom right wedge -->
    <polygon points="22,24 18,18 16,19 20,26"/>
  </g>
</svg>
